services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: rize
      POSTGRES_PASSWORD: rize
      POSTGRES_DB: rize
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rize -d rize"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./internal/store/migrations:/migrations
    entrypoint:
      [
        "migrate",
        "-path",
        "/migrations",
        "-database",
        "postgres://rize:rize@db:5432/rize?sslmode=disable",
        "up",
      ]
    restart: "no"

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://rize:rize@db:5432/rize?sslmode=disable"

volumes:
  db-data:
