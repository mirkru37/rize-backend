version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries"
    schema: "internal/store/migrations"
    gen:
      go:
        package: "storedb"
        out: "internal/store/storedb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
