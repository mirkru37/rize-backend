name: Deploy Production

on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AR_REPO: rize-backend

jobs:
  # Guard job: runs unconditionally and first. If the repo has not been
  # GCP-bootstrapped yet (no GCP_PROJECT_ID secret), it logs a clear message
  # and exits 0 so publishing a release never fails CI pre-bootstrap. All
  # later jobs are gated on its `configured` output.
  guard:
    name: Guard - GCP bootstrap check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check GCP_PROJECT_ID secret
        id: check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "deploy skipped — GCP not bootstrapped (GCP_PROJECT_ID secret unset). See docs/deployment.md for the bootstrap procedure."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "GCP_PROJECT_ID is set — proceeding with production deploy."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

  resolve-image:
    name: Resolve release commit and verify integration build exists
    needs: guard
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      api-image: ${{ steps.resolve.outputs.api-image }}
      migrate-image: ${{ steps.resolve.outputs.migrate-image }}
      api-digest: ${{ steps.digests.outputs.api-digest }}
      migrate-digest: ${{ steps.digests.outputs.migrate-digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - id: auth
        name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve release target commit SHA
        id: resolve
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          SHA="$(git rev-parse HEAD)"
          API_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/api"
          MIGRATE_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/migrate"
          echo "Release $TAG_NAME resolves to commit ${SHA}"
          {
            echo "sha=${SHA}"
            echo "api-image=${API_IMAGE}"
            echo "migrate-image=${MIGRATE_IMAGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify integration build exists for this commit and resolve immutable digests
        id: digests
        run: |
          set -e
          API_DIGEST="$(gcloud artifacts docker images describe \
              "${{ steps.resolve.outputs.api-image }}:${{ steps.resolve.outputs.sha }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format='value(image_summary.digest)' 2>/dev/null || true)"
          if [ -z "${API_DIGEST}" ]; then
            echo "::error::No integration build found for commit ${{ steps.resolve.outputs.sha }} at ${{ steps.resolve.outputs.api-image }}:${{ steps.resolve.outputs.sha }}. The deploy-integration workflow must have built and pushed an image for this exact commit (via a push to main) before a release targeting it can be promoted to production. Merge/land this commit on main first, wait for deploy-integration to succeed, then re-publish the release."
            exit 1
          fi
          MIGRATE_DIGEST="$(gcloud artifacts docker images describe \
              "${{ steps.resolve.outputs.migrate-image }}:${{ steps.resolve.outputs.sha }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format='value(image_summary.digest)' 2>/dev/null || true)"
          if [ -z "${MIGRATE_DIGEST}" ]; then
            echo "::error::No integration migration image found for commit ${{ steps.resolve.outputs.sha }} at ${{ steps.resolve.outputs.migrate-image }}:${{ steps.resolve.outputs.sha }}. See deploy-integration.yml — this image is built together with the API image."
            exit 1
          fi
          {
            echo "api-digest=${API_DIGEST}"
            echo "migrate-digest=${MIGRATE_DIGEST}"
          } >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy full stack to GCE
    needs: [guard, resolve-image]
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - id: auth
        name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify the production VM exists
        run: |
          if ! gcloud compute instances describe "${{ vars.GCE_INSTANCE }}" \
              --zone="${{ vars.GCE_ZONE }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null; then
            echo "::error::VM '${{ vars.GCE_INSTANCE }}' not found in zone '${{ vars.GCE_ZONE }}' (project ${{ secrets.GCP_PROJECT_ID }}). Run deploy/bootstrap-gce.sh (ENVIRONMENT=production) to create it first — see docs/deployment.md."
            exit 1
          fi

      # .env is rendered from this environment's GitHub Environment
      # vars/secrets via a heredoc (never echoed to the log) and scp'd to
      # the VM alongside the in-repo deploy compose file. Images are pinned
      # by the immutable digests resolve-image already verified — production
      # never rebuilds or deploys by mutable tag.
      - name: Render deploy .env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          API_IMAGE: ${{ needs.resolve-image.outputs.api-image }}
          MIGRATE_IMAGE: ${{ needs.resolve-image.outputs.migrate-image }}
          API_DIGEST: ${{ needs.resolve-image.outputs.api-digest }}
          MIGRATE_DIGEST: ${{ needs.resolve-image.outputs.migrate-digest }}
        run: |
          set +x
          DATABASE_URL="${DATABASE_URL_SECRET:-postgres://rize:${POSTGRES_PASSWORD}@timescaledb:5432/rize?sslmode=disable}"
          # Every value is double-quoted so a multi-line JWT_SIGNING_KEY (a
          # PEM-encoded key, per internal/config's doc comment) round-trips
          # through the .env file intact — docker compose's dotenv parser
          # supports quoted multi-line values.
          cat <<DEPLOYENV | sed 's/^[[:space:]]*//' > deploy.env
          ENVIRONMENT="production"
          POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
          DATABASE_URL="${DATABASE_URL}"
          JWT_SIGNING_KEY="${JWT_SIGNING_KEY}"
          CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS}"
          API_IMAGE="${API_IMAGE}@${API_DIGEST}"
          MIGRATE_IMAGE="${MIGRATE_IMAGE}@${MIGRATE_DIGEST}"
          DEPLOYENV

      - name: Ensure remote deploy directory exists
        run: |
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="mkdir -p ~/rize-backend"

      - name: Copy compose file and .env to the VM
        run: |
          gcloud compute scp deploy/docker-compose.deploy.yml \
            "${{ vars.GCE_INSTANCE }}":~/rize-backend/docker-compose.yml \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap
          gcloud compute scp deploy.env \
            "${{ vars.GCE_INSTANCE }}":~/rize-backend/.env \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap
          # .env holds plaintext secrets (DATABASE_URL, JWT_SIGNING_KEY,
          # POSTGRES_PASSWORD) — lock it down to the ssh'd-in user
          # immediately; it's deleted again once `up -d` no longer needs it
          # (see the deploy step below).
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="chmod 600 ~/rize-backend/.env"

      # Host docker commands run under sudo: the OS Login ssh user is not a
      # member of the docker group (nothing in deploy/bootstrap-gce.sh's
      # startup script adds it), so the docker-ce root:docker 0660 socket
      # rejects an unprivileged `docker`/`docker compose` invocation.
      # `docker compose run --rm -T migrate` disables pseudo-TTY allocation,
      # which isn't available (and isn't needed) for a one-shot,
      # non-interactive migration run over a scripted ssh command.
      - name: Pull images, run migrations, deploy api
        run: |
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="sudo docker login -u oauth2accesstoken --password-stdin https://${{ secrets.GCP_REGION }}-docker.pkg.dev && \
              cd ~/rize-backend && \
              sudo docker compose --env-file .env pull && \
              sudo docker compose --env-file .env run --rm -T migrate && \
              sudo docker compose --env-file .env up -d api && \
              rm -f .env" \
            <<< "${ACCESS_TOKEN}"

      # docker compose up -d returns as soon as the container is created,
      # not once the app is actually accepting connections, so this polls
      # /healthz with a bounded retry loop instead of curling once
      # immediately after the deploy step above.
      - name: Post-deploy health check
        run: |
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="for i in \$(seq 1 12); do
              if curl --fail --silent --show-error --max-time 5 http://localhost:8080/healthz; then
                exit 0
              fi
              echo \"healthz not ready yet (attempt \$i/12), retrying in 5s...\"
              sleep 5
            done
            echo \"healthz did not return 200 within 60s\" >&2
            exit 1"
