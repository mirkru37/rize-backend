name: API Docs

# RIZ-51: keeps openapi/openapi.yaml honest against the routes actually
# registered by cmd/api.newRouter, and proves the rendered docs site
# builds. Additive to ci.yml — it does not touch that workflow's jobs.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Validate + render OpenAPI spec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Fails on an invalid/malformed spec (missing required fields, bad
      # refs, schema violations, etc).
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2.37.0 lint openapi/openapi.yaml

      # Fails on drift: cmd/api/openapi_conformance_test.go walks the real
      # chi router built by newRouter and diffs its route table against the
      # operations declared in openapi/openapi.yaml. A route added/removed/
      # renamed in code without a matching spec update fails this step —
      # see that test file's doc comment for the exact comparison, and the
      # PR description for a demonstration of it catching an intentional
      # mismatch.
      - name: Check spec matches registered routes (drift gate)
        run: go test ./cmd/api/... -run TestOpenAPI -v

      # Renders the static Redoc docs site as an end-to-end check that the
      # spec is not just schema-valid but actually buildable into docs;
      # also produces the artifact the deploy-docs workflow publishes to
      # GitHub Pages on push to main.
      - name: Render static docs site
        run: |
          mkdir -p site
          npx --yes @redocly/cli@2.37.0 build-docs openapi/openapi.yaml -o site/index.html

      - name: Upload rendered docs site
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-site
          path: site/
          if-no-files-found: error
