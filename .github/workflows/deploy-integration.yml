name: Deploy Integration

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-integration
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AR_REPO: rize-backend
  API_ENVIRONMENT: staging # see internal/config: valid ENVIRONMENT values are development, staging, production — there is no literal "integration" value.

jobs:
  # Guard job: runs unconditionally and first. If the repo has not been
  # GCP-bootstrapped yet (no GCP_PROJECT_ID secret), it logs a clear message
  # and exits 0 so pushes to main never fail CI pre-bootstrap. All later
  # jobs are gated on its `configured` output.
  guard:
    name: Guard - GCP bootstrap check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check GCP_PROJECT_ID secret
        id: check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "deploy skipped — GCP not bootstrapped (GCP_PROJECT_ID secret unset). See docs/deployment.md for the bootstrap procedure."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "GCP_PROJECT_ID is set — proceeding with integration deploy."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and push images
    needs: guard
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Compute image references
        id: vars
        run: |
          API_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/api"
          MIGRATE_IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/migrate"
          echo "api-image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "migrate-image=${MIGRATE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: docker build -f Dockerfile -t "${{ steps.vars.outputs.api-image }}:${{ github.sha }}" -t "${{ steps.vars.outputs.api-image }}:integration" .

      - name: Build migration image
        run: docker build -f Dockerfile.migrate -t "${{ steps.vars.outputs.migrate-image }}:${{ github.sha }}" -t "${{ steps.vars.outputs.migrate-image }}:integration" .

      - name: Push API image
        run: docker push --all-tags "${{ steps.vars.outputs.api-image }}"

      - name: Push migration image
        run: docker push --all-tags "${{ steps.vars.outputs.migrate-image }}"

  deploy:
    name: Deploy full stack to GCE
    needs: [guard, build-and-push]
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: integration
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify the integration VM exists
        run: |
          if ! gcloud compute instances describe "${{ vars.GCE_INSTANCE }}" \
              --zone="${{ vars.GCE_ZONE }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null; then
            echo "::error::VM '${{ vars.GCE_INSTANCE }}' not found in zone '${{ vars.GCE_ZONE }}' (project ${{ secrets.GCP_PROJECT_ID }}). Run deploy/bootstrap-gce.sh (ENVIRONMENT=integration) to create it first — see docs/deployment.md."
            exit 1
          fi

      # .env is rendered from this environment's GitHub Environment
      # vars/secrets via a heredoc (never echoed to the log) and scp'd to
      # the VM alongside the in-repo deploy compose file. DATABASE_URL is
      # taken directly from the DATABASE_URL secret if the environment set
      # one, otherwise built from POSTGRES_PASSWORD against the in-stack
      # timescaledb service.
      - name: Render deploy .env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set +x
          DATABASE_URL="${DATABASE_URL_SECRET:-postgres://rize:${POSTGRES_PASSWORD}@timescaledb:5432/rize?sslmode=disable}"
          IMAGE_SHA="${{ github.sha }}"
          # Image base paths are recomputed here from secrets rather than
          # threaded through needs.build-and-push.outputs.*: GitHub Actions
          # redacts any job output containing a secret value before a
          # downstream job can read it, which previously left API_IMAGE /
          # MIGRATE_IMAGE empty and produced an invalid docker reference.
          API_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/api"
          MIGRATE_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/migrate"
          # The heredoc body below is indented to match this workflow file's
          # YAML nesting; the trailing `sed` strips that leading whitespace
          # so deploy.env ends up with flush-left KEY=VALUE lines. Nothing
          # here is echoed to the log (no `set -x`, no `cat`/`echo` of the
          # rendered values elsewhere).
          # Every value is double-quoted so a multi-line JWT_SIGNING_KEY (a
          # PEM-encoded key, per internal/config's doc comment) round-trips
          # through the .env file intact — docker compose's dotenv parser
          # supports quoted multi-line values.
          cat <<DEPLOYENV | sed 's/^[[:space:]]*//' > deploy.env
          ENVIRONMENT="${API_ENVIRONMENT}"
          POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
          DATABASE_URL="${DATABASE_URL}"
          JWT_SIGNING_KEY="${JWT_SIGNING_KEY}"
          CORS_ALLOWED_ORIGINS="${CORS_ALLOWED_ORIGINS}"
          API_IMAGE="${API_IMAGE}:${IMAGE_SHA}"
          MIGRATE_IMAGE="${MIGRATE_IMAGE}:${IMAGE_SHA}"
          DEPLOYENV

      - name: Ensure remote deploy directory exists
        run: |
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="mkdir -p ~/rize-backend"

      - name: Copy compose file and .env to the VM
        run: |
          gcloud compute scp deploy/docker-compose.deploy.yml \
            "${{ vars.GCE_INSTANCE }}":~/rize-backend/docker-compose.yml \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap
          gcloud compute scp deploy.env \
            "${{ vars.GCE_INSTANCE }}":~/rize-backend/.env \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap
          # .env holds plaintext secrets (DATABASE_URL, JWT_SIGNING_KEY,
          # POSTGRES_PASSWORD) — lock it down to the ssh'd-in user
          # immediately; it's deleted again once `up -d` no longer needs it
          # (see the deploy step below).
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="chmod 600 ~/rize-backend/.env"

      # Host docker commands run under sudo: the OS Login ssh user is not a
      # member of the docker group (nothing in deploy/bootstrap-gce.sh's
      # startup script adds it), so the docker-ce root:docker 0660 socket
      # rejects an unprivileged `docker`/`docker compose` invocation.
      # `docker compose run --rm -T migrate` disables pseudo-TTY allocation,
      # which isn't available (and isn't needed) for a one-shot,
      # non-interactive migration run over a scripted ssh command.
      - name: Pull images, run migrations, deploy api
        run: |
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="sudo docker login -u oauth2accesstoken --password-stdin https://${{ secrets.GCP_REGION }}-docker.pkg.dev && \
              cd ~/rize-backend && \
              sudo docker compose --env-file .env pull && \
              sudo docker compose --env-file .env run --rm -T migrate && \
              sudo docker compose --env-file .env up -d api && \
              rm -f .env" \
            <<< "${ACCESS_TOKEN}"

      # docker compose up -d returns as soon as the container is created,
      # not once the app is actually accepting connections, so this polls
      # /healthz with a bounded retry loop instead of curling once
      # immediately after the deploy step above.
      - name: Post-deploy health check
        run: |
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone="${{ vars.GCE_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tunnel-through-iap \
            --command="for i in \$(seq 1 12); do
              if curl --fail --silent --show-error --max-time 5 http://localhost:8080/healthz; then
                exit 0
              fi
              echo \"healthz not ready yet (attempt \$i/12), retrying in 5s...\"
              sleep 5
            done
            echo \"healthz did not return 200 within 60s\" >&2
            exit 1"
